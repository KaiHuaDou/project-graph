name: Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "nx.json"
      - ".github/workflows/android-build.yml"

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            tools
            platform-tools
            platforms;android-34
            build-tools;34.0.0
            ndk;27.0.12077973

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize Android project if needed
        run: |
          if [ ! -d "app/src-tauri/gen/android" ]; then
            pnpm --filter @graphif/project-graph tauri android init --ci
          fi

      - name: Build debug APK
        run: pnpm --filter @graphif/project-graph tauri android build -- --apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-graph-android-apk
          path: app/src-tauri/gen/android/app/build/outputs/**/*.apk
          if-no-files-found: error
          retention-days: 7
